name: SmartExpense CI

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    services:

      postgres:

        image: postgres:17

        env:

          POSTGRES_DB: smartexpense

          POSTGRES_USER: postgres

          POSTGRES_PASSWORD: postgres


        ports:

          - 5432:5432


        options: >-

          --health-cmd pg_isready

          --health-interval 10s

          --health-timeout 5s

          --health-retries 5



    env:

      JWT_SECRET: mysecretkeymysecretkeymysecretkeymysecretkey

      DB_URL: jdbc:postgresql://localhost:5432/smartexpense

      DB_USER: postgres

      DB_PASS: postgres



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4



      - name: Set up Java 21

        uses: actions/setup-java@v4

        with:

          java-version: '21'

          distribution: 'temurin'

          cache: maven



      - name: Give permission to Maven Wrapper

        run: chmod +x mvnw



      - name: Run tests

        run: ./mvnw test